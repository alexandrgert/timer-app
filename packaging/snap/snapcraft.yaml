name: tasktimer-link-b24
version: "@VERSION@"
summary: Desktop task timer with Bitrix24 integration
description: |
  TaskTimer link B24 — таймер задач, план на день, WebDAV и интеграция Битрикс24.

grade: stable
confinement: strict
base: core22

apps:
  tasktimer-link-b24:
    command: bin/tasktimer-link-b24
    plugs:
      - network
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  app:
    plugin: nil
    source: root/
    override-build: |
      set -eux
      mkdir -p "$CRAFT_PART_INSTALL/opt/tasktimer-link-b24"
      mkdir -p "$CRAFT_PART_INSTALL/bin"
      mkdir -p "$CRAFT_PART_INSTALL/usr/share/applications"
      mkdir -p "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps"
      cp -a opt/tasktimer-link-b24/. "$CRAFT_PART_INSTALL/opt/tasktimer-link-b24/"
      install -Dm755 usr/bin/tasktimer-link-b24 "$CRAFT_PART_INSTALL/bin/tasktimer-link-b24"
      install -Dm644 usr/share/applications/tasktimer-link-b24.desktop \
        "$CRAFT_PART_INSTALL/usr/share/applications/tasktimer-link-b24.desktop"
      install -Dm644 usr/share/icons/hicolor/scalable/apps/tasktimer-link-b24.svg \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/tasktimer-link-b24.svg"
